<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Jilong (Jason) Wu — researcher, engineer, and product builder."
    />
    <title>Jilong (Jason) Wu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f7f4;
        --bg-card: #edecea;
        --text: #1a1a18;
        --text-muted: #6b6a64;
        --accent: #9a7b3e;
        --accent-dim: rgba(154, 123, 62, 0.08);
        --border: rgba(26, 26, 24, 0.09);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        background-image: radial-gradient(
            ellipse at 68% 44%,
            rgba(154, 123, 62, 0.045) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 25% 82%,
            rgba(154, 123, 62, 0.025) 0%,
            transparent 40%
          );
        color: var(--text);
        font-family: "Outfit", system-ui, sans-serif;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Grain texture overlay */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
        opacity: 0.018;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px 256px;
      }

      ::selection {
        background: var(--accent);
        color: #fff;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── Layout ── */

      .shell {
        width: min(100% - 80px, 1280px);
        min-height: 100svh;
        margin-inline: auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      /* ── Header ── */

      header {
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        animation: fadeIn 0.9s ease both;
      }

      .logo {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .logo span {
        color: var(--accent);
      }

      .location {
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      /* ── Intro section ── */

      .intro {
        align-self: center;
        padding: 60px 0;
        display: grid;
        grid-template-columns: 1fr 220px;
        align-items: center;
        gap: clamp(60px, 10vw, 140px);
      }

      .intro-copy {
        min-width: 0;
      }

      /* Status badge */
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 30px;
        padding: 8px 18px;
        background: var(--accent-dim);
        border: 1px solid rgba(154, 123, 62, 0.14);
        border-radius: 100px;
        color: var(--accent);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        animation: fadeUp 0.8s ease both 0.15s;
      }

      .eyebrow::before {
        content: "";
        width: 6px;
        height: 6px;
        background: var(--accent);
        border-radius: 50%;
        flex-shrink: 0;
        animation: pulse 2.4s ease-in-out infinite;
      }

      /* Name */
      h1 {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(62px, 7.8vw, 110px);
        font-weight: 300;
        line-height: 0.92;
        letter-spacing: -0.04em;
        animation: fadeUp 0.8s ease both 0.25s;
      }

      h1 em {
        font-style: italic;
        font-weight: 400;
        color: var(--accent);
      }

      /* Bio */
      .bio {
        max-width: 520px;
        margin-top: 32px;
        font-size: clamp(17px, 1.5vw, 20px);
        line-height: 1.72;
        letter-spacing: -0.005em;
        color: var(--text-muted);
        animation: fadeUp 0.8s ease both 0.35s;
      }

      /* ── Social links ── */

      .links {
        display: flex;
        gap: 10px;
        margin-top: 40px;
        animation: fadeUp 0.8s ease both 0.45s;
      }

      .links a {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(26, 26, 24, 0.12);
        border-radius: 14px;
        color: var(--text-muted);
        transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .links a:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(154, 123, 62, 0.1);
      }

      .links a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .links svg {
        width: 21px;
        height: 21px;
        fill: currentColor;
      }

      .links img {
        width: 23px;
        height: 23px;
        display: block;
        filter: grayscale(1) opacity(0.42);
        transition: filter 0.28s ease;
      }

      .links a:hover img {
        filter: grayscale(1) opacity(0.78);
      }

      /* ── Portrait ── */

      .portrait {
        position: relative;
        aspect-ratio: 4 / 5;
        border-radius: 22px;
        overflow: hidden;
        background: var(--bg-card);
        box-shadow:
          0 0 0 1px rgba(26, 26, 24, 0.06),
          0 20px 60px rgba(26, 26, 24, 0.1),
          0 4px 16px rgba(26, 26, 24, 0.06);
        animation: fadeUp 1s ease both 0.3s;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .portrait:hover {
        transform: translateY(-5px) scale(1.012);
      }

      .portrait::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        pointer-events: none;
      }

      .portrait img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        position: relative;
        z-index: 1;
      }

      .portrait-placeholder {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--text-muted);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* ── Footer ── */

      footer {
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 12px;
        letter-spacing: 0.06em;
        animation: fadeIn 0.8s ease both 0.7s;
      }

      /* ── Animations ── */

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ── Mobile ── */

      @media (max-width: 768px) {
        .shell {
          width: min(100% - 40px, 1280px);
        }

        header {
          height: 64px;
        }

        .intro {
          align-self: start;
          padding: 24px 0 48px;
          grid-template-columns: 1fr;
          gap: 28px;
        }

        .intro-copy {
          display: flex;
          flex-direction: column;
        }

        .portrait {
          width: min(48vw, 170px, 24svh);
          justify-self: center;
          grid-row: 1;
          border-radius: 18px;
        }

        .portrait:hover {
          transform: none;
        }

        .eyebrow {
          margin-bottom: 16px;
          font-size: 10px;
          padding: 6px 14px;
        }

        h1 {
          font-size: clamp(48px, 13vw, 74px);
          line-height: 0.9;
        }

        /* Links before bio on mobile */
        .links {
          order: 1;
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          gap: 8px;
          margin-top: 24px;
          padding: 10px;
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 20px;
        }

        .links a {
          width: 100%;
          height: 50px;
          border-radius: 12px;
          border-color: transparent;
        }

        .links a:hover {
          transform: none;
          box-shadow: none;
        }

        .bio {
          order: 2;
          margin-top: 24px;
          font-size: 16px;
          line-height: 1.6;
        }

        footer {
          min-height: 72px;
          gap: 16px;
          font-size: 11px;
        }

        footer span:last-child {
          text-align: right;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-delay: 0s !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
